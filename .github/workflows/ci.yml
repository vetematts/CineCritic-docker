name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # GitHub Actions cron uses UTC. Brisbane is AEST (UTC+10) year-round.
    # Weekly Wed 11:11am AEST = Wed 01:11 UTC
    - cron: "11 1 * * 3"
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://test_user:test_password@localhost:5432/cinecritic_test
      DATABASE_SSL: "false"
      JWT_SECRET: test_jwt_secret
      TMDB_API_KEY: test_tmdb_api_key

    steps:
      - uses: actions/checkout@v4

      - name: Prepare log directory
        run: mkdir -p ci-artifacts/test-logs

      - name: Install frontend deps
        uses: ./.github/actions/node-install
        with:
          working-directory: frontend

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint 2>&1 | tee ../ci-artifacts/test-logs/frontend-lint.log

      - name: Test frontend
        working-directory: frontend
        run: npm test -- --run --reporter=verbose 2>&1 | tee ../ci-artifacts/test-logs/frontend-vitest.log

      - name: Install backend deps
        uses: ./.github/actions/node-install
        with:
          working-directory: backend

      - name: Lint backend
        working-directory: backend
        run: npm run lint 2>&1 | tee ../ci-artifacts/test-logs/backend-lint.log

      - name: Test backend
        working-directory: backend
        run: npm test 2>&1 | tee ../ci-artifacts/test-logs/backend-jest.log

      - name: Upload backend test report (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml
          if-no-files-found: warn
          retention-days: 30

      - name: Write test run summary
        if: always()
        run: |
          {
            echo "# CI test run"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
            echo "- Run: ${GITHUB_RUN_ID}"
            echo ""
            echo "Artifacts under \`ci-artifacts/test-logs/\` include lint and test output for frontend and backend."
          } > ci-artifacts/test-logs/README.md

      - name: Upload test and lint logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-logs
          path: ci-artifacts/test-logs/
          retention-days: 30
