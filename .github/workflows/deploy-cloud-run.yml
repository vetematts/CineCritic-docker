# Manual production deployment only. This workflow does not run on push.
name: Deploy Cloud Run

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub environment to deploy to
        type: environment
        required: true
      gcp_region:
        description: GCP region (e.g. australia-southeast1)
        type: string
        required: true
        default: australia-southeast1
      image_tag:
        description: Artifact Registry tag to deploy (usually latest or sha-xxxxxxxx)
        type: string
        required: true
        default: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_environment }}
    permissions:
      contents: read
    env:
      BACKEND_SERVICE_NAME: cinecritic-backend
      FRONTEND_SERVICE_NAME: cinecritic-frontend
      GCP_AR_REGION: ${{ secrets.GCP_ARTIFACT_REGISTRY_REGION }}
      GCP_AR_REPOSITORY: ${{ secrets.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
      DEPLOY_ENVIRONMENT: ${{ github.event.inputs.target_environment }}
      DEPLOY_REGION: ${{ github.event.inputs.gcp_region }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy backend
        env:
          DATABASE_URL: ${{ secrets.RUN_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.RUN_JWT_SECRET }}
          TMDB_API_KEY: ${{ secrets.RUN_TMDB_API_KEY }}
          CLOUDSQL_CONNECTION_NAME: ${{ secrets.CLOUDSQL_CONNECTION_NAME }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          AR_HOST="${GCP_AR_REGION}-docker.pkg.dev"
          IMAGE="${AR_HOST}/${GCP_PROJECT_ID}/${GCP_AR_REPOSITORY}/cinecritic-backend:${IMAGE_TAG}"

          # Use an env vars file to avoid escaping issues (DATABASE_URL contains @, :, etc).
          cat > backend-env.yaml <<EOF
          DATABASE_URL: "${DATABASE_URL}"
          JWT_SECRET: "${JWT_SECRET}"
          TMDB_API_KEY: "${TMDB_API_KEY}"
          NODE_ENV: "production"
          DATABASE_SSL: "false"
          EOF

          if [ -z "${CLOUDSQL_CONNECTION_NAME:-}" ]; then
            echo "ERROR: CLOUDSQL_CONNECTION_NAME is not set." >&2
            echo "Set it to: <project-id>:<region>:<instance-id> (e.g. cinecritic-493502:australia-southeast1:cinecritic-db)" >&2
            exit 1
          fi

          gcloud run deploy "$BACKEND_SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --image "$IMAGE" \
            --region "$DEPLOY_REGION" \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances "$CLOUDSQL_CONNECTION_NAME" \
            --env-vars-file backend-env.yaml

      - name: Capture backend revision
        id: backend_revision
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          REV="$(gcloud run revisions list \
            --service "$BACKEND_SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$DEPLOY_REGION" \
            --format 'value(metadata.name)' \
            --limit 1 2>/dev/null || true)"

          if [ -z "$REV" ]; then
            REV="unknown"
          fi

          echo "revision=$REV" >> "$GITHUB_OUTPUT"
          echo "Backend revision: $REV" >> "$GITHUB_STEP_SUMMARY"

      - name: Backend service URL
        id: backend_url
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          URL=$(gcloud run services describe "$BACKEND_SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$DEPLOY_REGION" \
            --format 'value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Backend URL: $URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy frontend
        env:
          VITE_API_BASE_URL: ${{ steps.backend_url.outputs.url }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          AR_HOST="${GCP_AR_REGION}-docker.pkg.dev"
          IMAGE="${AR_HOST}/${GCP_PROJECT_ID}/${GCP_AR_REPOSITORY}/cinecritic-frontend:${IMAGE_TAG}"
          gcloud run deploy "$FRONTEND_SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --image "$IMAGE" \
            --region "$DEPLOY_REGION" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "VITE_API_BASE_URL=${VITE_API_BASE_URL}"

      - name: Capture frontend revision
        id: frontend_revision
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          REV="$(gcloud run revisions list \
            --service "$FRONTEND_SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$DEPLOY_REGION" \
            --format 'value(metadata.name)' \
            --limit 1 2>/dev/null || true)"

          if [ -z "$REV" ]; then
            REV="unknown"
          fi

          echo "revision=$REV" >> "$GITHUB_OUTPUT"
          echo "Frontend revision: $REV" >> "$GITHUB_STEP_SUMMARY"

      - name: Frontend service URL
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          URL=$(gcloud run services describe "$FRONTEND_SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$DEPLOY_REGION" \
            --format 'value(status.url)')
          echo "Frontend URL: $URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Deployment summary
        run: |
          {
            echo "Deployment environment: ${DEPLOY_ENVIRONMENT}"
            echo "Region: ${DEPLOY_REGION}"
            echo "Image tag: ${IMAGE_TAG}"
            echo "Backend revision: ${{ steps.backend_revision.outputs.revision }}"
            echo "Frontend revision: ${{ steps.frontend_revision.outputs.revision }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write deployment summary artifact
        if: always()
        run: |
          {
            echo "environment=${DEPLOY_ENVIRONMENT}"
            echo "region=${DEPLOY_REGION}"
            echo "image_tag=${IMAGE_TAG}"
            echo "backend_revision=${{ steps.backend_revision.outputs.revision }}"
            echo "backend_url=${{ steps.backend_url.outputs.url }}"
            echo "frontend_revision=${{ steps.frontend_revision.outputs.revision }}"
          } > deployment-summary.txt

      - name: Upload deployment summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment-summary.txt
          retention-days: 90
