name: Docker build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://test_user:test_password@localhost:5432/cinecritic_test
      JWT_SECRET: test_jwt_secret
      TMDB_API_KEY: test_tmdb_api_key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Test backend
        working-directory: backend
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      APP_VERSION: v1.0
      APP_ENV: ci
      NODE_ENV: development
      POSTGRES_DB: cinecritic
      POSTGRES_USER: cinecritic_app
      VITE_API_BASE_URL: http://localhost:4000
      DATABASE_SSL: "false"
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      DATABASE_URL: postgres://cinecritic_app:${{ secrets.POSTGRES_PASSWORD }}@db:5432/cinecritic

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build

  publish-images:
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image_name: cinecritic-frontend
          - context: ./backend
            dockerfile: ./backend/Dockerfile
            image_name: cinecritic-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
