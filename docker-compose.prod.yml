services:
  frontend:
    image: cinecritic-frontend:${APP_VERSION:-v1.0}-prod-${GIT_COMMIT:-local}
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    ports:
      - "8080:80"

  backend:
    image: cinecritic-backend:${APP_VERSION:-v1.0}-prod-${GIT_COMMIT:-local}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      NODE_ENV: production

