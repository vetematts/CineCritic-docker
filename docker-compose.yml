services:
  frontend:
    image: cinecritic-frontend:${APP_VERSION:-v1.0}-${APP_ENV:-dev}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - cinecritic-network

  backend:
    image: cinecritic-backend:${APP_VERSION:-v1.0}-${APP_ENV:-dev}
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgres://cinecritic_app:replace_with_strong_dev_password@db:5432/cinecritic}
      JWT_SECRET: ${JWT_SECRET:-replace_with_strong_jwt_secret}
      TMDB_API_KEY: ${TMDB_API_KEY:-your_tmdb_api_key}
      DATABASE_SSL: ${DATABASE_SSL:-false}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cinecritic-network

  db:
    image: postgres:16-alpine
    container_name: cinecritic-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cinecritic}
      POSTGRES_USER: ${POSTGRES_USER:-cinecritic_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_with_strong_dev_password}
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cinecritic_app} -d ${POSTGRES_DB:-cinecritic}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cinecritic-network

networks:
  cinecritic-network:
    driver: bridge
